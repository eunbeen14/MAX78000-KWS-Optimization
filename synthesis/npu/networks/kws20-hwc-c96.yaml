# ==============================================================================
# [Custom Hardware Synthesis Configuration]
# Target: MAX78000 NPU
# Architecture: ResNet-lite (Base Channel: 96)
# Status: SYNTHESIS FAILED (Hardware Constraint Proven)
# 
# [Failure Analysis]
# Tried to manually rescue P0 by shifting processor routing (e.g., 0x000fffffffff0000)
# to balance memory load. However, expanding the channels to 96 inherently exceeded 
# the maximum physical SRAM allocated per processor (432KB total limit).
# 
# [Compiler Error Log]
# ERROR: Layer 9 (kws_conv4_Conv_6): Kernel memory exhausted at processor 16; 
# offset: 676 (0x02a4), needed: 96.
# ==============================================================================
---
arch: ai87kws20net_resnet
dataset: KWS_20

layers:
  - name: voice_conv1_Conv_8
    data_format: HWC
    processors: 0xffffffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 1
    pad: 0
    activate: Relu

  - name: voice_conv2_Conv_6
    in_offset: 0x4000
    processors: 0x0000ffffffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

  - name: voice_conv3_Conv_6
    in_sequences: [voice_conv2_Conv_6]
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: None
    write_gap: 1

  - name: shortcut_Conv_6
    in_sequences: [voice_conv2_Conv_6]
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: None
    write_gap: 1

  - name: residual_add
    in_sequences: [shortcut_Conv_6, voice_conv3_Conv_6]
    in_offset: 0x4000
    processors: 0x0000ffffffffffff
    out_offset: 0x0000
    op: Passthrough
    eltwise: Add
    operands: 2

  - name: voice_conv4_Conv_6
    in_sequences: [residual_add]
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu

  # =====================================================================
  # [Optimization Attempt] Processor Masking 
  # Shifted routing backwards (0000) to rest P0~P15 after the strict Add constraint.
  # =====================================================================
  - name: kws_conv1_Conv_6
    in_offset: 0x4000
    processors: 0x000fffffffff0000
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

  - name: kws_conv2_Conv_6
    in_offset: 0x0000
    processors: 0xffffffffffff0000
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu

  - name: kws_conv3_Conv_6
    in_offset: 0x4000
    processors: 0xffffffffffff0000
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    avg_pool: 2
    pool_stride: 2

  - name: kws_conv4_Conv_6
    in_offset: 0x0000
    processors: 0xffffffffffff0000
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
