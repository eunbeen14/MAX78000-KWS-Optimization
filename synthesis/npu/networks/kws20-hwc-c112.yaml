# ==============================================================================
# [Custom Hardware Synthesis Configuration]
# Target: MAX78000 NPU
# Architecture: ResNet-lite (Base Channel: 112)
# Status: SYNTHESIS FAILED (Hardware Limit Reached)
# 
# [Optimization Attempt & Analysis]
# Implemented custom Processor Masking (e.g., 0xfffffffffff00000) to explicitly 
# rescue Processor 0 (P0) from memory exhaustion during Add operations. 
# Although the load balancing successfully bypassed the initial P0 bottleneck, 
# the total channel width (112) still inherently exceeded the global 432KB SRAM limit.
# ==============================================================================
---
arch: ai87kws20net_resnet
dataset: KWS_20

layers:
  - name: voice_conv1_Conv_8
    data_format: HWC
    processors: 0xffffffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 1
    pad: 0
    activate: Relu

  - name: voice_conv2_Conv_6
    processors: 0x00ffffffffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

  - name: voice_conv3_Conv_6
    in_sequences: [voice_conv2_Conv_6]
    processors: 0x00ffffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: None
    write_gap: 1

  - name: shortcut_Conv_6
    in_sequences: [voice_conv2_Conv_6]
    processors: 0x00ffffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: None
    write_gap: 1

  - name: residual_add
    in_sequences: [shortcut_Conv_6, voice_conv3_Conv_6]
    processors: 0x00ffffffffffffff
    out_offset: 0x0000
    op: Passthrough
    eltwise: Add
    operands: 2

  - name: voice_conv4_Conv_6
    in_sequences: [residual_add]
    processors: 0x00ffffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu

  # ====================================================================
  # [Custom Routing] Load Balancing
  # Shifting the workload to processors P8~P63 to avoid P0 memory overflow.
  # ====================================================================
  - name: kws_conv1_Conv_6
    processors: 0xfffffffffff00000  # (44-bit Mask) Rescuing P0~P7
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

  - name: kws_conv2_Conv_6
    processors: 0xffffffffffffff00  # (56-bit Mask) Rescuing P0~P3
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu

  - name: kws_conv3_Conv_6
    processors: 0xffffffffffffff00
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    avg_pool: 2
    pool_stride: 2

  - name: kws_conv4_Conv_6
    processors: 0xffffffffffffff00
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

  - name: fc_MatMul_3
    processors: 0xffffffffffffff00
    out_offset: 0x0000
    op: Linear
    flatten: true
    activate: None