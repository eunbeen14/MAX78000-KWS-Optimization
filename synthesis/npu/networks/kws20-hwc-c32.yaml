# ==============================================================================
# [Custom Hardware Synthesis Configuration]
# Target: MAX78000 NPU
# Architecture: ResNet-lite (Base Channel: 32)
# Status: SUCCESS (Ultra-Lightweight Baseline)
# Note: Processor masks explicitly dialed down to 32-bit (0x00000000ffffffff)
# to perfectly match the halved channel width. Leaves P32~P63 completely idle 
# to save power and memory space.
# ==============================================================================
---
arch: ai87kws20net_resnet
dataset: KWS_20

layers:
  - name: voice_conv1_Conv_8
    data_format: HWC
    processors: 0xffffffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 1
    pad: 0
    activate: Relu

  - name: voice_conv2_Conv_6
    in_offset: 0x4000
    processors: 0x0000ffffffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

  - name: voice_conv3_Conv_6
    in_sequences: [voice_conv2_Conv_6]
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: None
    write_gap: 1
    output_processors: 0x00000000ffffffff  # [Optimization] 32-bit explicitly enforced

  - name: shortcut_Conv_6
    in_sequences: [voice_conv2_Conv_6]
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: None
    write_gap: 1
    output_processors: 0x00000000ffffffff  # [Optimization] 32-bit explicitly enforced

  - name: residual_add
    in_sequences: [shortcut_Conv_6, voice_conv3_Conv_6]
    in_offset: 0x0000
    processors: 0x00000000ffffffff
    out_offset: 0x4000
    op: Passthrough
    eltwise: Add
    operands: 2

  - name: voice_conv4_Conv_6
    in_sequences: [residual_add]
    in_offset: 0x4000
    processors: 0x00000000ffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu

  - name: kws_conv1_Conv_6
    in_offset: 0x0000
    processors: 0x0000000000ffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

  - name: kws_conv2_Conv_6
    in_offset: 0x4000
    processors: 0x00000000ffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu

  - name: kws_conv3_Conv_6
    in_offset: 0x0000
    processors: 0x00000000ffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    avg_pool: 2
    pool_stride: 2

  - name: kws_conv4_Conv_6
    in_offset: 0x4000
    processors: 0x0000000000ffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

  - name: fc_MatMul_3
    in_offset: 0x0000
    processors: 0x00000000ffffffff
    out_offset: 0x4000
    op: Linear
    flatten: true
    activate: None