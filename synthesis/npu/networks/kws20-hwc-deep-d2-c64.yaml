# ==============================================================================
# [Custom Hardware Synthesis Configuration]
# Target: MAX78000 NPU
# Architecture: ResNet-lite (Base Channel: 64, Extra Depth: 2)
# Status: SUCCESS
# Note: To avoid SRAM overwrite during the deeper sequential convolutions, 
# out_offsets were dynamically shifted to unused memory quadrants (0x2000, 0x6000).
# ==============================================================================
---
arch: ai87kws20net_resnet
dataset: KWS_20

layers:
  - name: voice_conv1_Conv_8
    data_format: HWC
    processors: 0xffffffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 1
    pad: 0
    activate: Relu

  - name: voice_conv2_Conv_6
    in_offset: 0x4000
    processors: 0x0000ffffffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

# === [EXTRA DEPTH 2 BLOCKS START] ===
  - name: extra_convs_0
    in_sequences: [voice_conv2_Conv_6]
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x2000              # [Optimization] Shifted to 0x2000 to prevent collision
    op: Conv1d
    kernel_size: 3
    pad: 1
    activate: None

  - name: extra_adds_0
    in_sequences: [voice_conv2_Conv_6, extra_convs_0]
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x4000              # Safe write to 0x4000
    op: Passthrough
    eltwise: Add
    operands: 2

  - name: extra_convs_1
    in_sequences: [extra_adds_0]
    in_offset: 0x4000
    processors: 0x0000ffffffffffff
    out_offset: 0x6000              # [Optimization] Shifted to 0x6000
    op: Conv1d
    kernel_size: 3
    pad: 1
    activate: None

  - name: extra_adds_1
    in_sequences: [extra_adds_0, extra_convs_1]
    in_offset: 0x4000
    processors: 0x0000ffffffffffff
    out_offset: 0x0000              # Clean return to 0x0000
    op: Passthrough
    eltwise: Add
    operands: 2
# === [EXTRA DEPTH 2 BLOCKS END] ===

  - name: voice_conv3_Conv_6
    in_sequences: [extra_adds_1]
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: None
    write_gap: 1
    output_processors: 0xffffffffffffffff

  - name: shortcut_Conv_6
    in_sequences: [extra_adds_1]
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: None
    write_gap: 1
    output_processors: 0xffffffffffffffff

  - name: residual_add
    in_sequences: [shortcut_Conv_6, voice_conv3_Conv_6]
    in_offset: 0x0000
    processors: 0xffffffffffffffff
    out_offset: 0x4000
    op: Passthrough
    eltwise: Add
    operands: 2

  - name: voice_conv4_Conv_6
    in_sequences: [residual_add]
    in_offset: 0x4000
    processors: 0xffffffffffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu

  - name: kws_conv1_Conv_6
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

  - name: kws_conv2_Conv_6
    in_offset: 0x4000
    processors: 0xffffffffffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu

  - name: kws_conv3_Conv_6
    in_offset: 0x0000
    processors: 0x0000ffffffffffff
    out_offset: 0x4000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    avg_pool: 2
    pool_stride: 2

  - name: kws_conv4_Conv_6
    in_offset: 0x4000
    processors: 0x0000ffffffffffff
    out_offset: 0x0000
    op: Conv1d
    kernel_size: 3
    pad: 0
    activate: Relu
    max_pool: 2
    pool_stride: 2
    pool_dilation: [1, 1]

  - name: fc_MatMul_3
    in_offset: 0x0000
    processors: 0xffffffffffffffff
    out_offset: 0x4000
    op: Linear
    flatten: true
    activate: None